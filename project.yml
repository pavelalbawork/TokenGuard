name: TokenGuard
options:
  bundleIdPrefix: com.palba
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
targets:
  TokenGuard:
    type: application
    platform: macOS
    sources:
      - path: TokenGuard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palba.TokenGuard
        PRODUCT_NAME: TokenGuard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        INFOPLIST_KEY_CFBundleDisplayName: TokenGuard
        INFOPLIST_KEY_LSUIElement: YES
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: NO
  TokenGuardTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TokenGuardTests
    dependencies:
      - target: TokenGuard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palba.TokenGuardTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
schemes:
  TokenGuard:
    build:
      targets:
        TokenGuard: all
        TokenGuardTests: [test]
    test:
      targets:
        - TokenGuardTests
